<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Range Picker with Litepicker</title>
    <!-- Litepicker CSS from CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litepicker/dist/css/litepicker.css"/>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calendar.css">
    <script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
</head>
<body>

    <!-- Input field styled as a button -->
    <span class="dropdown-placeholder2">Budget class</span>
    <input type="text" id="litepicker" placeholder="Departure / Return" readonly/>

    <!-- Litepicker JS from CDN -->
    <script>
        const picker = new Litepicker({
            element: document.getElementById('litepicker'),
            singleMode: false,  // Allows selecting a date range
            numberOfMonths: 1,  // Display one month at a time
            minDate: new Date(),  // Sets the minimum date to today
            format: 'DD/MM/YYYY',  // Set the date format to DD/MM/YYYY
            autoApply: false,  // Disables auto-apply after selecting dates
            buttonText: {
                apply: 'Go',  // Change Apply button text
                cancel: 'Cancel'  // Change Cancel button text
            },
            setup: (picker) => {
                // This function should run when Litepicker is set up
                // No date selection logic here, we're keeping it minimal
            }
        });

        // Show the calendar when input is focused
        document.getElementById('litepicker').addEventListener('focus', () => {
            picker.show();
        });

        // Also ensure it's displayed on click, even if the input is readonly
        document.getElementById('litepicker').addEventListener('click', () => {
            picker.show();
        });

        document.addEventListener('click', function(event) {
        const pickerElement = document.querySelector('.litepicker');
        if (pickerElement && !pickerElement.contains(event.target)) {
            // Do not hide the calendar when clicking outside
            picker.show();
        }
    });

    </script>

</body>
</html>
