    <!-- Dynamic GSAP Transition Handling for index -->
    <script src="scripts.js"></script>
    <script>
        function updateContent() {
            const leftSection = document.querySelector('.section-left');
            const rightSection = document.querySelector('.section-right');
            const plane = document.querySelector('.button-container2'); // The button that triggers the animation
        
            // Create a GSAP timeline for coordinated animations
            const tl = gsap.timeline();
        
            // Step 1: Animate the plane to "fly" up and down
            tl.set(plane, { zIndex: 10 }) // Ensure it's on top during the animation
              .to(plane, {
                  scale: 1.5,        // Move the plane upwards
                  opacity: 0.9,              
                  ease: 'power1.inOut'

              })
        
              // Step 6: Fade in the right section after plane animation finishes
              .call(() => {
                fetch('cities.html')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    rightSection.innerHTML = data; // Set the HTML content to the fetched data
                });
        
                // Reset right section's position and opacity for the next animation
                gsap.set(rightSection, { opacity: 0, display: 'block' }); // Set to block to make it visible
              })
              .to(rightSection, {
                  opacity: 1, 
                  duration: 0.7,
                  ease: 'power2.inOut'
              });
        
            applyResponsiveStyles(); // Apply any responsive styles you need
        };
        
        function applyResponsiveStyles() {
            const rightSection = document.querySelector('.section-right');
            const plane = document.querySelector('.plane-img'); // Ensure the plane element is selected
        
            // Check for different screen sizes and apply styles
            const mobileQuery = window.matchMedia('(max-width: 600px)');
            const tabletQuery = window.matchMedia('(min-width: 601px) and (max-width: 900px)');
        
            if (mobileQuery.matches) {
                // Mobile styles
                gsap.to(plane, { scale: 0.7 }); // Resize plane for mobile (smaller)
            } else if (tabletQuery.matches) {
                // Tablet styles
                gsap.to(plane, { scale: 0.8 }); // Resize plane for tablets (medium size)
            } else {
                // Desktop and larger screens
                gsap.to(plane, { scale: 1 }); // Full size for larger screens
            }
        }
        
        // Call the function when the button is clicked
        document.querySelector('.button-link3').addEventListener('click', function(event) {
            event.preventDefault(); // Prevent default link behavior
            updateContent(); // Call the content update function
        });
        </script>
