<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaiving</title>
    <link rel="stylesheet" href="cards.css">
    <link rel="apple-touch-icon" sizes="180x180" href="pics/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="pics/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="pics/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
</head>

<body> 
    <div class="virtualcards">
        <div class="card-container">
            <div class="card-container__header" style="background-image: url(pics/VV-logo-web.png); background-size: 120px 120px; background-repeat: no-repeat; background-position: center;"></div>
            <div class="card-container__content">
                <span class="title">Vaiving, looks amazing. What is it?</span>
                <span class="description">We offer full-package (flights and hotel) surprise trips throughout Europe in <span style="text-decoration: underline;">3-simple clicks</span>.</span>
                <span class="button1">
                    <common-button>
                        <button mat-flat-button color="primary" class="common-button" type="button">
                            <span class="button-wrapper">
                                <div class="common-button__label">Learn More</div>
                            </span>
                        </button>
                    </common-button>
                </span>
            </div>
        </div>
    
        <div class="card-container">
            <div class="card-container__header" style="background-image: url(pics/Paris.jpg);"></div>
            <div class="card-container__content">
                <span class="title">Take the wheel and explore</span>
                <span class="description">Find the car you want at the price you like.</span>
                <span class="button1">
                    <common-button>
                        <button mat-flat-button color="primary" class="common-button" type="button">
                            <span class="button-wrapper">
                                <div class="common-button__label">Choose your car</div>
                            </span>
                        </button>
                    </common-button>
                </span>
            </div>
        </div>
    
        <div class="card-container">
            <div class="card-container__header" style="background-image: url(pics/Barcelona.avif);"></div>
            <div class="card-container__content">
                <span class="title">Park at the airport</span>
                <span class="description">Travel with more peace of mind and save time and money.</span>
                <span class="button1">
                    <common-button>
                        <button mat-flat-button color="primary" class="common-button" type="button">
                            <span class="button-wrapper">
                                <div class="common-button__label">Book your parking space</div>
                            </span>
                        </button>
                    </common-button>
                </span>
            </div>
        </div>
    </div>    

</body>
