<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pop-ups.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/daterangepicker/3.0.5/daterangepicker.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/daterangepicker/3.0.5/daterangepicker.min.js"></script>

<style>

/* Style for the daterangepicker (Calendar) */
        /* Full-screen styling */
        .daterangepicker {
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Styling the input fields */
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            margin: 20px auto;
            display: block;
        }

</style>

    <title>Dynamic Pop-up</title>
</head>
<body>
    <!-- Button to trigger the pop-up -->
    <span class="button1">
        <common-button>
            <button id="openPopup" mat-flat-button color="primary" class="common-button" type="button">
                <span class="button-wrapper">
                    <div class="common-button__label">How does it work?</div>
                </span></button>

    <!-- Pop-up HTML -->
    <div class="overlay" id="popupOverlay"></div>
    <div class="popup" id="popupContainer">
        <h2>How does the platform work?</h2>
        <img src="pics/space.png" width="300px" height="600px">
        <button class="close-btn" id="closePopup">Close</button>
    </div>

    <!-- Date Range Picker Inputs -->
    <input type="text" id="departure" placeholder="Departure Date">
    <input type="text" id="return" placeholder="Return Date">

    <script>
        // Get elements by their IDs
        const openPopup = document.getElementById('openPopup');
        const closePopup = document.getElementById('closePopup');
        const popupContainer = document.getElementById('popupContainer');
        const popupOverlay = document.getElementById('popupOverlay');

        // Function to show the pop-up
        openPopup.onclick = function() {
            popupContainer.style.display = 'block';
            popupOverlay.style.display = 'block';
        }

        // Function to hide the pop-up
        closePopup.onclick = function() {
            popupContainer.style.display = 'none';
            popupOverlay.style.display = 'none';
        }

        // Hide the pop-up if the overlay is clicked
        popupOverlay.onclick = function() {
            popupContainer.style.display = 'none';
            popupOverlay.style.display = 'none';
        }


        $(function() {
            // Initialize the date range picker on departure input
            $('#departure').daterangepicker({
                opens: 'center',
                minDate: moment(), // Set the minimum date to today
                autoApply: true,
                locale: {
                    format: 'MM/DD/YYYY'
                }
            }, function(start, end, label) {
                console.log("Departure date selected: " + start.format('MM/DD/YYYY'));
            });

            // Initialize the date range picker on return input
            $('#return').daterangepicker({
                opens: 'center',
                minDate: moment(), // Set the minimum date to today
                autoApply: true,
                locale: {
                    format: 'MM/DD/YYYY'
                }
            }, function(start, end, label) {
                console.log("Return date selected: " + start.format('MM/DD/YYYY'));
            });

            // Ensure return date cannot be selected before departure date
            $('#departure').on('apply.daterangepicker', function(ev, picker) {
                $('#return').data('daterangepicker').setStartDate(picker.endDate);
                $('#return').data('daterangepicker').setMinDate(picker.endDate);
            });
        });


    </script>
</body>
</html>
